name: Refresh Dev Analytics

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: salomao-refresh-dev-analytics
  cancel-in-progress: false

jobs:
  refresh-dev-analytics:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sincronizar checkout dev
        run: |
          bash scripts/sync-checkout-to-ref.sh /srv/salomao/dev/app dev

      - name: Reprocessar analytics do dev
        run: |
          cd /srv/salomao/dev/app/backend
          .venv/bin/python - <<'PY'
          from app.db.session import SessionLocal
          from app.services.cache_invalidation import refresh_finance_analytics_caches
          from app.services.company_context import get_current_company

          with SessionLocal() as db:
              company = get_current_company(db)
              refresh_finance_analytics_caches(db, company, include_sales_history=True)
              print(f"Analytics do dev atualizados para a empresa {company.id}.")
          PY

      - name: Healthcheck
        run: |
          sleep 3
          curl --fail --silent --show-error http://127.0.0.1:8101/api/v1/health
          echo
          echo "Refresh dos analytics do dev concluido com sucesso"
