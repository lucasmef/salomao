name: Update SSH Access (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      allowed_source:
        description: "IPv4/IPv6 ou CIDR autorizado para SSH"
        required: true
        type: string

jobs:
  update-ssh-access:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply SSH source restriction
        run: bash ./scripts/update-ssh-access.sh "${{ inputs.allowed_source }}"
