name: Check Prod Secret Lengths

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    steps:
      - name: Check secret lengths in /srv/salomao/prod/app/.env
        run: |
          ENV_FILE="/srv/salomao/prod/app/.env"
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "Erro: .env nao encontrado em /srv/salomao/prod/app/"
            exit 1
          fi
          
          check_length() {
            local key="$1"
            local val=$(grep "^$key=" "$ENV_FILE" | cut -d'=' -f2-)
            if [[ -z "$val" ]]; then
              echo "$key: <nao encontrado>"
            else
              echo "$key: ${#val} caracteres"
            fi
          }
          
          check_length "SESSION_SECRET"
          check_length "FIELD_ENCRYPTION_KEY"
          check_length "APP_MODE"
