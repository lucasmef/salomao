name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: salomao-deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sincronizar checkout dev
        run: |
          bash scripts/sync-checkout-to-ref.sh /srv/salomao/dev/app dev

      - name: Deploy dev
        run: |
          bash /srv/salomao/dev/app/scripts/deploy-dev.sh

      - name: Healthcheck
        run: |
          sleep 3
          curl --fail --silent --show-error http://127.0.0.1:8101/api/v1/health
          echo
          echo "Deploy dev concluido com sucesso"

      - name: Archive Logs on Failure
        if: failure()
        run: |
          mkdir -p debug-logs
          SERVICE_NAME="salomao-dev.service"
          sudo journalctl -u $SERVICE_NAME -n 500 --no-pager > debug-logs/systemd.log || true
          sudo tail -n 100 /var/log/nginx/error.log > debug-logs/nginx.log || true

      - name: Upload Debug Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-debug-logs-dev-${{ github.run_id }}
          path: debug-logs/
          retention-days: 1
