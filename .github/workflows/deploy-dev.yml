name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: salomao-deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: self-hosted
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: "[RESEARCH] Inspect Prod Evidence"
        run: |
          LATEST_EVIDENCE=$(ls -td /srv/salomao/prod/deploy-evidence/app/checkout-dirty-*/ 2>/dev/null | head -n 1 || true)
          if [[ -n "$LATEST_EVIDENCE" ]]; then
            echo "==> Inspecionando: $LATEST_EVIDENCE"
            ls -R "$LATEST_EVIDENCE"
            if [[ -f "$LATEST_EVIDENCE/tracked.diff" ]]; then
              echo "==> Diffs detectados:"
              cat "$LATEST_EVIDENCE/tracked.diff"
            fi
            if [[ -f "$LATEST_EVIDENCE/status.txt" ]]; then
              echo "==> Status do Git:"
              cat "$LATEST_EVIDENCE/status.txt"
            fi
          else
            echo "Nenhuma evidencia encontrada em /srv/salomao/prod/deploy-evidence/app/"
          fi

      - name: Sincronizar checkout dev
        run: |
          SYNC_CHECKOUT_DIRTY_POLICY=reset bash scripts/sync-checkout-to-ref.sh /srv/salomao/dev/app dev

      - name: Deploy dev
        run: |
          bash /srv/salomao/dev/app/scripts/deploy-dev.sh

      - name: Healthcheck
        run: |
          sleep 3
          curl --fail --silent --show-error http://127.0.0.1:8101/api/v1/health
          echo
          echo "Deploy dev concluido com sucesso"

      - name: Archive Logs on Failure
        if: failure()
        shell: bash
        run: |
          (
            set +x
            mkdir -p debug-logs
            SERVICE_NAME="salomao-dev.service"
            sudo -n journalctl -u $SERVICE_NAME -n 500 --no-pager > debug-logs/systemd.log 2>&1 || true
            sudo -n tail -n 100 /var/log/nginx/error.log > debug-logs/nginx.log 2>&1 || true
          ) > /dev/null 2>&1

      - name: Upload Debug Artifact
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-debug-logs-dev-${{ github.run_id }}
          path: debug-logs/
          retention-days: 1
