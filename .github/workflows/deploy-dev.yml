name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag ou commit para publicar no ambiente dev"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: salomao-deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Deploy dev
        env:
          GIT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || 'main' }}
        run: |
          bash ./scripts/github-actions-deploy-dev.sh "$GIT_REF"
