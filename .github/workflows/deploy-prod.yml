name: Deploy Prod

on:
  workflow_dispatch:

run-name: "Deploy Prod a partir de dev por ${{ github.actor }}"

permissions:
  contents: read
  deployments: write

concurrency:
  group: salomao-deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: self-hosted
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolver SHA autorizado
        id: resolve
        run: |
          git fetch origin dev --tags --quiet

          TARGET_SHA=$(git rev-parse origin/dev)
          echo "==> Promovendo apenas o HEAD atual de origin/dev"
          echo "==> SHA resolvido: $TARGET_SHA"

          echo "TARGET_SHA=$TARGET_SHA" >> $GITHUB_OUTPUT
          echo "==> Validacao concluida com sucesso."

      - name: Sincronizar checkout prod
        run: |
          bash scripts/sync-checkout-to-ref.sh /srv/salomao/prod/app ${{ steps.resolve.outputs.TARGET_SHA }}

      - name: Deploy prod
        run: |
          bash /srv/salomao/prod/app/scripts/deploy-prod.sh

      - name: Auditoria de producao
        run: |
          bash /srv/salomao/prod/app/scripts/check-prod.sh

      - name: Healthcheck
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8100/api/v1/health
          echo
          echo "Deploy prod (@ ${{ steps.resolve.outputs.TARGET_SHA }}) concluido com sucesso"

