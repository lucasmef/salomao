name: Deploy Prod

on:
  workflow_dispatch:

run-name: "Deploy Prod a partir de dev por ${{ github.actor }}"

permissions:
  contents: read
  deployments: write

concurrency:
  group: salomao-deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: self-hosted
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolver SHA autorizado
        id: resolve
        run: |
          git fetch origin dev --tags --quiet

          TARGET_SHA=$(git rev-parse origin/dev)
          echo "==> Promovendo apenas o HEAD atual de origin/dev"
          echo "==> SHA resolvido: $TARGET_SHA"

          echo "TARGET_SHA=$TARGET_SHA" >> $GITHUB_OUTPUT
          echo "==> Validacao concluida com sucesso."

      - name: Sincronizar checkout prod
        run: |
          SYNC_CHECKOUT_DIRTY_POLICY=reset bash scripts/sync-checkout-to-ref.sh /srv/salomao/prod/app ${{ steps.resolve.outputs.TARGET_SHA }}

      - name: Deploy prod
        run: |
          bash /srv/salomao/prod/app/scripts/deploy-prod.sh

      - name: Auditoria de producao
        run: |
          bash /srv/salomao/prod/app/scripts/check-prod.sh

      - name: Healthcheck
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8100/api/v1/health
          echo
          echo "Deploy prod (@ ${{ steps.resolve.outputs.TARGET_SHA }}) concluido com sucesso"

      - name: Diagnose on Failure
        if: failure()
        run: |
          echo "==> Deploy falhou. Executando diagnostico de startup..."
          cd /srv/salomao/prod/app
          # Tenta rodar o script de diagnostico usando o venv de producao
          if [[ -f "diagnose_startup.py" ]]; then
            /srv/salomao/prod/app/venv/bin/python diagnose_startup.py || true
          else
             echo "Script diagnose_startup.py nao encontrado."
          fi

      - name: Archive Logs on Failure
        if: failure()
        shell: bash
        run: |
          (
            set +x
            mkdir -p debug-logs
            SERVICE_NAME="salomao-prod.service"
            # Fallback: tenta capturar o status mesmo sem sudo total (as vezes mostra as ultimas linhas)
            systemctl status $SERVICE_NAME > debug-logs/systemd-status.log 2>&1 || true
            sudo -n journalctl -u $SERVICE_NAME -n 500 --no-pager > debug-logs/systemd-prod.log 2>&1 || true
            sudo -n tail -n 100 /var/log/nginx/error.log > debug-logs/nginx-prod.log 2>&1 || true
          ) > /dev/null 2>&1

      - name: Upload Debug Artifact
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-debug-logs-prod-${{ github.run_id }}
          path: debug-logs/
          retention-days: 1
